<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Dongle Setup</title>
<style>
  :root { --accent: #2563eb; --bg: #f9fafb; --card: #fff; --border: #e5e7eb; --green: #16a34a; --red: #dc2626; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: #1a1a1a; padding: 16px; max-width: 480px; margin: 0 auto; }
  h1 { font-size: 1.4rem; margin-bottom: 4px; }
  .sub { color: #6b7280; font-size: 0.9rem; margin-bottom: 20px; }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 16px; margin-bottom: 12px; }
  .card h2 { font-size: 1rem; margin-bottom: 12px; color: #374151; }
  label { display: block; font-size: 0.85rem; font-weight: 600; color: #4b5563; margin-bottom: 4px; margin-top: 12px; }
  label:first-child { margin-top: 0; }
  input, select { width: 100%; padding: 10px 12px; border: 1px solid var(--border); border-radius: 8px; font-size: 1rem; background: var(--bg); }
  input:focus, select:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(37,99,235,0.1); }
  .btn { display: block; width: 100%; padding: 12px; border: none; border-radius: 10px; font-size: 1rem; font-weight: 600; cursor: pointer; margin-top: 8px; }
  .btn-primary { background: var(--accent); color: white; }
  .btn-primary:active { background: #1d4ed8; }
  .btn-secondary { background: var(--bg); color: #374151; border: 1px solid var(--border); }
  .btn-danger { background: #fef2f2; color: var(--red); border: 1px solid #fecaca; }
  .status { padding: 8px 12px; border-radius: 8px; font-size: 0.85rem; margin-top: 12px; display: none; }
  .status.ok { display: block; background: #dcfce7; color: var(--green); }
  .status.err { display: block; background: #fef2f2; color: var(--red); }
  .wifi-list { max-height: 200px; overflow-y: auto; }
  .wifi-item { display: flex; align-items: center; justify-content: space-between; padding: 10px; border-bottom: 1px solid var(--border); cursor: pointer; }
  .wifi-item:last-child { border-bottom: none; }
  .wifi-item:active { background: var(--bg); }
  .wifi-item .name { font-weight: 500; }
  .wifi-item .signal { font-size: 0.8rem; color: #6b7280; }
  .info-row { display: flex; justify-content: space-between; padding: 6px 0; font-size: 0.9rem; }
  .info-row .label { color: #6b7280; }
  .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; }
  .dot.green { background: var(--green); }
  .dot.red { background: var(--red); }
  .loading { text-align: center; padding: 40px; color: #6b7280; }
</style>
</head>
<body>

<h1>Dongle Setup</h1>
<p class="sub" id="model">Ladataan...</p>

<div id="content">
  <div class="loading">Yhdistetaan dongleen...</div>
</div>

<script>
const API = window.location.origin + '/api';

async function loadStatus() {
  try {
    const res = await fetch(API + '/status');
    const data = await res.json();
    renderUI(data);
  } catch(e) {
    document.getElementById('content').innerHTML =
      '<div class="loading">Ei yhteytta dongleen.<br>Varmista etta olet yhdistetty Dongle-verkkoon.</div>';
  }
}

function renderUI(data) {
  const c = data.config;
  const s = data.system;

  document.getElementById('model').textContent = s.model || 'Dongle';

  document.getElementById('content').innerHTML = `
    <div class="card">
      <h2>Dongle</h2>
      <label>Nimi</label>
      <input id="name" type="text" value="${esc(c.dongle_name)}" placeholder="Donglen nimi">
      <label>Tila</label>
      <select id="mode">
        <option value="auto" ${c.mode==='auto'?'selected':''}>Automaattinen (NDI > AirPlay)</option>
        <option value="airplay" ${c.mode==='airplay'?'selected':''}>Vain AirPlay (1080p)</option>
        <option value="ndi" ${c.mode==='ndi'?'selected':''}>Vain NDI (4K)</option>
      </select>
    </div>

    <div class="card">
      <h2>Wi-Fi</h2>
      <div id="wifi-list" class="wifi-list"><div class="loading">Skannataan...</div></div>
      <label>Salasana</label>
      <input id="wifi-pass" type="password" value="${esc(c.wifi_password)}" placeholder="Wi-Fi-salasana">
      <input id="wifi-ssid" type="hidden" value="${esc(c.wifi_ssid)}">
    </div>

    <div class="card">
      <h2>Tila</h2>
      <div class="info-row">
        <span class="label">Wi-Fi</span>
        <span><span class="dot ${s.wifi_connected?'green':'red'}"></span>${s.wifi_connected ? (s.wifi_ssid||'Yhdistetty') : 'Ei yhteytta'}</span>
      </div>
      <div class="info-row">
        <span class="label">Palvelu</span>
        <span>${s.dongle_service || '-'}</span>
      </div>
      ${s.temperature_c ? `<div class="info-row"><span class="label">Lampotila</span><span>${s.temperature_c} &deg;C</span></div>` : ''}
      ${s.ip_addresses?.length ? `<div class="info-row"><span class="label">IP</span><span>${s.ip_addresses.join(', ')}</span></div>` : ''}
    </div>

    <div id="status" class="status"></div>

    <button class="btn btn-primary" onclick="saveConfig()">Tallenna</button>
    <button class="btn btn-secondary" onclick="rebootDongle()">Kaynnista uudelleen</button>
  `;

  scanWifi(c.wifi_ssid);
}

async function scanWifi(currentSSID) {
  try {
    const res = await fetch(API + '/wifi/scan');
    const data = await res.json();
    const list = document.getElementById('wifi-list');
    if (!data.networks?.length) {
      list.innerHTML = '<div style="padding:10px;color:#6b7280">Ei verkkoja</div>';
      return;
    }
    list.innerHTML = data.networks.map(n => `
      <div class="wifi-item" onclick="selectWifi('${esc(n.ssid)}', this)">
        <span class="name">${n.ssid === currentSSID ? '<b>'+esc(n.ssid)+'</b>' : esc(n.ssid)}</span>
        <span class="signal">${n.signal}% ${n.security ? '&#x1f512;' : ''}</span>
      </div>
    `).join('');
  } catch(e) {
    document.getElementById('wifi-list').innerHTML = '<div style="padding:10px;color:#6b7280">Skannaus epaonnistui</div>';
  }
}

function selectWifi(ssid, el) {
  document.getElementById('wifi-ssid').value = ssid;
  document.querySelectorAll('.wifi-item').forEach(e => e.style.background = '');
  el.style.background = '#dbeafe';
}

async function saveConfig() {
  const status = document.getElementById('status');
  status.className = 'status';
  status.style.display = 'none';

  const config = {
    dongle_name: document.getElementById('name').value,
    mode: document.getElementById('mode').value,
    wifi_ssid: document.getElementById('wifi-ssid').value,
    wifi_password: document.getElementById('wifi-pass').value,
  };

  try {
    const res = await fetch(API + '/config', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(config),
    });
    const data = await res.json();
    if (data.success) {
      status.textContent = 'Tallennettu!';
      status.className = 'status ok';
    } else {
      status.textContent = 'Virhe: ' + (data.errors?.join(', ') || 'tuntematon');
      status.className = 'status err';
    }
  } catch(e) {
    status.textContent = 'Yhteysvirhe: ' + e.message;
    status.className = 'status err';
  }
}

async function rebootDongle() {
  if (confirm('Kaynnistetaanko dongle uudelleen?')) {
    await fetch(API + '/reboot', {method:'POST'}).catch(()=>{});
    document.getElementById('content').innerHTML = '<div class="loading">Kaynnistyy uudelleen...<br>Yhdista uudelleen hetken kuluttua.</div>';
  }
}

function esc(s) { return (s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":"&#39;"}[c])); }

loadStatus();
</script>

</body>
</html>
